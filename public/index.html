<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #E9CBAE; font-family: 'Courier New', Courier, monospace; }
        .neon-purple { color: #A020F0; text-shadow: 0 0 10px #A020F0; }
        .border-purple { border: 1px solid #A020F0; box-shadow: 0 0 5px #A020F0; }
        .sand-text { color: #E9CBAE; }
        .bg-card { background-color: #0a0a0a; border: 1px solid #E9CBAE; }
    </style>
</head>
<body class="p-8">
    <header class="mb-10 border-b border-purple-600 pb-4">
        <h1 class="text-4xl font-bold neon-purple uppercase tracking-tighter">[ System Active ] Crypto Command Center</h1>
        <p class="sand-text mt-2">Network Status: <span class="text-green-500">ENCRYPTED // LIVE</span></p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Main Alert Feed -->
        <div class="lg:col-span-2">
            <h2 class="text-2xl mb-4 neon-purple font-bold italic">>> Real-Time Alerts</h2>
            <div id="alert-feed" class="space-y-4">
                <!-- Data loaded here -->
                <p>Establishing uplink to Airtable...</p>
            </div>
        </div>

        <!-- Trending Sidebar -->
        <div class="lg:col-span-1">
            <h2 class="text-2xl mb-4 sand-text font-bold uppercase underline">Hype Intelligence</h2>
            <div id="trending-feed" class="bg-card p-4 rounded shadow-lg space-y-4">
                <!-- Trending data loaded here -->
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                // Fetch Alerts
                const alertRes = await fetch('/api/alerts');
                const alerts = await alertRes.json();
                const feed = document.getElementById('alert-feed');
                feed.innerHTML = alerts.map(record => `
                    <div class="bg-card p-4 rounded border-l-4 ${record.fields['24h Change %'] > 0 ? 'border-purple-600' : 'border-orange-200'}">
                        <div class="flex justify-between">
                            <span class="neon-purple font-bold text-xl">${record.fields['Coin Name']}</span>
                            <span class="sand-text font-bold">${record.fields['24h Change %']}%</span>
                        </div>
                        <div class="text-sm sand-text mt-2 opacity-70">
                            PRICE: $${record.fields['Price USD']} | TIME: ${new Date(record.fields['Timestamp']).toLocaleTimeString()}
                        </div>
                    </div>
                `).join('');

                // Fetch Trending
                const trendRes = await fetch('/api/trending');
                const trendData = await trendRes.json();
                const trendFeed = document.getElementById('trending-feed');
                trendFeed.innerHTML = trendData.slice(0, 7).map(record => `
                    <div class="border-b border-gray-800 pb-2 flex justify-between">
                        <span class="sand-text font-bold">${record.fields['Coin Name']}</span>
                        <span class="neon-purple">RANK #${record.fields['Market Cap Rank']}</span>
                    </div>
                `).join('');
            } catch (e) { console.error("Link Failed", e); }
        }

        setInterval(fetchData, 30000); // Auto-refresh every 30s
        fetchData();
    </script>
</body>
</html>
